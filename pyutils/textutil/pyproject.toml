[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "textutil"
version = "1.0.0"
description = "A comprehensive Python library for text processing and manipulation"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Bruce Fang", email = "henshao.fang@outlook.com"}
]
keywords = ["text", "processing", "manipulation", "string", "utility"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Text Processing",
    "Topic :: Utilities"
]
dependencies = []

[project.urls]
Homepage = "https://github.com/brucestudios/textutil"
Documentation = "https://github.com/brucestudios/textutil#readme"
Repository = "https://github.com/brucestudios/textutil"
Issues = "https://github.com/brucestudios/textutil/issues"

[tool.setuptools.packages.find]
where = ["textutil"]